services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: news_ai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_ai
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: dev
      # API_KEY: set_me
      # OPENAI_API_KEY: set_me
      # HF_INFERENCE_API_KEY: set_me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_ai
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: dev
      # OPENAI_API_KEY: set_me
      # HF_INFERENCE_API_KEY: set_me
    command: ["celery", "-A", "workers.celery_app", "worker", "-l", "INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_ai
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: dev
    command: ["celery", "-A", "workers.celery_app", "beat", "-l", "INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

