<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile & preferences</title>
  <style>
    :root { --bg:#0b0f14; --card:#121826; --text:#e8edf7; --muted:#94a3b8; --accent:#38bdf8; --border:rgba(148,163,184,.2);}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;line-height:1.5;max-width:640px;margin:0 auto;padding:1.25rem;}
    h1{font-size:1.25rem;}
    label{display:block;font-size:.85rem;color:var(--muted);margin:.5rem 0 .2rem;}
    input,select,textarea{width:100%;padding:.5rem;border-radius:8px;border:1px solid var(--border);background:#0b0f14;color:var(--text);}
    textarea{min-height:72px;font-family:monospace;font-size:.8rem;}
    button{margin-top:.75rem;padding:.55rem 1rem;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#0b0f14;font-weight:700;cursor:pointer;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;}
    #out{font-size:.8rem;color:var(--muted);white-space:pre-wrap;}
    a{color:var(--accent);}
  </style>
</head>
<body>
  <h1>Profile & notification preferences</h1>
  <p class="muted">Uses <code>PATCH /v1/users/{id}/preferences</code> and <code>POST /v1/users/{id}/devices/fcm</code>. Set API base and key to match your deployment.</p>

  <div class="card">
    <label>API base (e.g. http://localhost:8000)</label>
    <input id="apiBase" placeholder="http://localhost:8000" />
    <label>X-API-KEY (if server requires)</label>
    <input id="apiKey" type="password" placeholder="optional" />
    <label>User external id</label>
    <input id="userId" placeholder="demo-user-1" />
  </div>

  <div class="card">
    <h2 style="margin-top:0;font-size:1rem;">Preferences (JSON merge)</h2>
    <label>Sentiment preference</label>
    <select id="sentiment">
      <option value="any">Any</option>
      <option value="positive_or_neutral">Positive or neutral</option>
      <option value="positive">Positive only</option>
      <option value="neutral">Neutral only</option>
      <option value="negative">Negative only</option>
    </select>
    <label>Preferred categories (comma-separated slugs, e.g. technology,politics)</label>
    <input id="cats" placeholder="technology, sports" />
    <label>Content view</label>
    <select id="contentView">
      <option value="summary">Summary first</option>
      <option value="full">Full article</option>
    </select>
    <label><input type="checkbox" id="notifEnabled" checked /> In-app notifications enabled</label>
    <label><input type="checkbox" id="pushEnabled" /> Push (FCM) enabled</label>
    <label><input type="checkbox" id="breaking" checked /> Breaking alerts</label>
    <button type="button" id="btnSave">Save preferences</button>
  </div>

  <div class="card">
    <h2 style="margin-top:0;font-size:1rem;">FCM device token</h2>
    <label>FCM registration token (from your web/mobile client)</label>
    <textarea id="fcmToken" placeholder="Paste FCM token…"></textarea>
    <button type="button" id="btnFcm">Register token</button>
  </div>

  <p><a href="/news">← Back to news feed</a> · <a href="/v1/legal/privacy" id="privacy">Privacy</a></p>
  <div id="out"></div>

  <script>
    function base() { return document.getElementById("apiBase").value.replace(/\/+$/, ""); }
    function headers() {
      const h = { "Content-Type": "application/json" };
      const k = document.getElementById("apiKey").value.trim();
      if (k) h["X-API-KEY"] = k;
      return h;
    }
    function uid() { return document.getElementById("userId").value.trim(); }
    document.getElementById("privacy").href = (base() || "") + "/v1/legal/privacy";

    document.getElementById("btnSave").onclick = async () => {
      const u = uid();
      if (!u) { document.getElementById("out").textContent = "Set user id."; return; }
      const cats = document.getElementById("cats").value.split(",").map((s) => s.trim().toLowerCase()).filter(Boolean);
      const body = {
        sentiment_preference: document.getElementById("sentiment").value,
        preferred_categories: cats.length ? cats : undefined,
        content_view: document.getElementById("contentView").value,
        notifications: {
          enabled: document.getElementById("notifEnabled").checked,
          push_enabled: document.getElementById("pushEnabled").checked,
          breaking: document.getElementById("breaking").checked,
        },
      };
      const r = await fetch(base() + "/v1/users/" + encodeURIComponent(u) + "/preferences", { method: "PATCH", headers: headers(), body: JSON.stringify(body) });
      const j = await r.json().catch(() => ({}));
      document.getElementById("out").textContent = r.ok ? JSON.stringify(j, null, 2) : (j.detail || r.statusText);
    };

    document.getElementById("btnFcm").onclick = async () => {
      const u = uid();
      const token = document.getElementById("fcmToken").value.trim();
      if (!u || !token) { document.getElementById("out").textContent = "User id and FCM token required."; return; }
      const r = await fetch(base() + "/v1/users/" + encodeURIComponent(u) + "/devices/fcm", { method: "POST", headers: headers(), body: JSON.stringify({ token, platform: "web" }) });
      const j = await r.json().catch(() => ({}));
      document.getElementById("out").textContent = r.ok ? JSON.stringify(j, null, 2) : (j.detail || r.statusText);
    };
  </script>
</body>
</html>
